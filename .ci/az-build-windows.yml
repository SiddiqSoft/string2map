# ============================================================================
# Azure Pipelines Windows Build Template
# ============================================================================
#
# Purpose: Build the project on Windows with MSVC compiler
# Called by: azure-pipelines.yml (StgBldWindows stage)
# Triggers: When RunWindows parameter is true
#
# This template:
# 1. Builds the project on Windows with MSVC compiler
# 2. Supports x64 and arm64 architectures
# 3. Runs tests (optional)
# 4. Creates NuGet packages
# 5. Publishes build artifacts

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: displayName
    type: string

  - name: architectures
    type: stringList
    default: [ x64, arm64 ]
    values: [ x64, arm64 ]

  - name: compilers
    type: stringList
    default: [ MSVC ]
    values: [ MSVC ]

  - name: buildTypes
    type: stringList
    default: [ Release, Debug ]
    values: [ Release, Debug ]

  - name: runTests
    type: boolean
    default: true

  - name: publishNuGet
    type: boolean
    default: false


# ============================================================================
# JOBS
# ============================================================================
jobs:
  - ${{ each arch in parameters.architectures }}:
    - ${{ each compiler in parameters.compilers }}:
        - ${{ each buildType in parameters.buildTypes }}:
          - job: Job_Windows_${{ arch }}_${{ compiler }}_${{ buildType }}
            displayName: "Build Windows ${{ arch }} with ${{ compiler }} (${{ buildType }})"
            
            #condition: eq('${{ arch }}', $(Agent.OSArchitecture))
            
            workspace:
              clean: all
            
            pool:
              name: Default
              demands:
                - Agent.OS -equals Windows_NT
                #- Agent.OSArchitecture -equals ${{ arch }}
                # add additional demands here

            variables:
              cmakePreset: Windows-${{ arch }}-${{ buildType }}
              buildType: ${{ buildType }}

            steps:
              # ====================================================================
              # Checkout & Cleanup
              # ====================================================================
              - checkout: self
                name: step1

              # ====================================================================
              # Environment Setup
              # ====================================================================
              - task: BatchScript@1
                displayName: Detect Visual Studio paths
                inputs:
                  filename: $(System.DefaultWorkingDirectory)/.ci/pipeline_detect_vs_path.bat
                  modifyEnvironment: true
              
              - task: BatchScript@1
                displayName: Setup ${{ compiler }} environment
                inputs:
                  filename: $(VCVARS_PATH)
                  arguments: $(AGENT_OSARCHITECTURE)
                  modifyEnvironment: true

              - template: az-pretest-windows.yml
                parameters:
                  architecture: ${{ arch }}
                  runTests: ${{ parameters.runTests }}
              
              # ====================================================================
              # Version Detection
              # ====================================================================
              - task: gitversion-setup@4
                displayName: Install GitVersion
                inputs:
                  versionSpec: 6.x
                  preferLatestVersion: true

              - task: gitversion-execute@4
                displayName: Determine Version
                name: version_step
                inputs:
                  useConfigFile: true
                  configFilePath: GitVersion.yml
                  updateBuildNumber: true
              
              # ====================================================================
              # Build Number
              # ====================================================================
              - task: PowerShell@2
                displayName: Set Build Number (Release)
                inputs:
                  targetType: inline
                  script: Write-Host "##vso[build.updateBuildNumber]$(GITVERSION_MAJORMINORPATCH)"
                condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))

              - task: PowerShell@2
                displayName: Set Build Number (Pre-release)
                inputs:
                  targetType: inline
                  script: Write-Host "##vso[build.updateBuildNumber]$(GITVERSION_SEMVER)"
                condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

              # ====================================================================
              # Build
              # ====================================================================
              - task: CMake@1
                displayName: CMake Configure
                inputs:
                  cmakeArgs: "--preset $(cmakePreset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(cpmCachePath)"
                  workingDirectory: $(System.DefaultWorkingDirectory)
              
              - task: CMake@1
                displayName: CMake Build
                inputs:
                  cmakeArgs: "--build --preset $(cmakePreset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(cpmCachePath)"
                  workingDirectory: $(System.DefaultWorkingDirectory)
                condition: succeeded()

              - task: PublishBuildArtifacts@1
                displayName: Publish Build Artifacts
                inputs:
                  PathtoPublish: $(System.DefaultWorkingDirectory)/build/$(cmakePreset)
                  ArtifactName: build-$(cmakePreset)
                  publishLocation: Container
                condition: succeeded()
              
              # ====================================================================
              # Testing
              # ====================================================================
              - task: CMake@1
                displayName: CMake Tests
                inputs:
                  cmakeArgs: "-E chdir $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests ctest --output-junit $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests/results/$(cmakePreset)_test_detail.xml --output-on-failure"
                continueOnError: true
                condition: and(succeeded(), eq(${{ parameters.runTests }}, true))

              - template: az-posttest-windows.yml
                parameters:
                  runTests: ${{ parameters.runTests }}
                  architecture: ${{ arch }}
              
              - task: PublishTestResults@2
                displayName: Publish Test Results
                inputs:
                  testResultsFormat: JUnit
                  testRunTitle: Tests $(cmakePreset)
                  testResultsFiles: $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests/results/$(cmakePreset)_test_detail.xml
                  mergeTestResults: false
                  buildConfiguration: $(BuildType)
                continueOnError: true
                condition: and(succeeded(), eq(${{ parameters.runTests }}, true), or(eq(variables['BuildType'], 'Release'), failed()))
              
              # ====================================================================
              # NuGet Packaging
              # ====================================================================
              - task: NuGetToolInstaller@1
                displayName: Install NuGet
                inputs:
                  versionSpec: ">=6.0.0-0"
                  checkLatest: true
                condition: succeeded()

              - task: NuGetCommand@2
                displayName: NuGet Pack
                inputs:
                  command: pack
                  packagesToPack: pack/*.nuspec
                  versioningScheme: off
                  buildProperties: VERSION=$(GITVERSION_MAJORMINORPATCH)
                condition: succeeded()

              - task: PublishBuildArtifacts@1
                displayName: Publish NuGet Artifacts
                inputs:
                  PathtoPublish: $(Build.ArtifactStagingDirectory)
                  ArtifactName: nuget-packages
                  publishLocation: Container
                condition: succeeded()
