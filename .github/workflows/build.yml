# ============================================================================
# GitHub Actions Main Configuration
# ============================================================================
#
# This workflow:
# 1. Builds the library across multiple platforms with a build matrix
#    - Windows (x64, arm64) with MSVC
#    - Linux (x64) with Clang and GCC
# 2. Runs tests on all platforms
# 3. Publishes to NuGet and GitHub (on main/master branches)
#
# Workflow Jobs:
# 1. Windows - Build and test for Windows with matrix for architecture and compiler
# 2. Linux - Build and test for Linux with matrix for architecture and compiler
# 3. Publish - Publishes to NuGet and GitHub
#
# Requirements:
# - Self-hosted runners with labels: windows, linux
# - Windows runner: Visual Studio, CMake, Ninja, Git
# - Linux runner: CMake, Ninja, Clang/GCC, Git
# ============================================================================

name: Build and Test

# ============================================================================
# TRIGGER CONFIGURATION
# ============================================================================
on:
  push:
    branches:
      - main
      - master
      - development
      - develop
      - release/*
    paths-ignore:
      - README.md

  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:
    inputs:
      architectures:
        description: 'Architectures to build'
        required: false
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x64
          - arm64,x64
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'Windows,Linux'
        type: choice
        options:
          - Windows
          - Linux
          - Windows,Linux
      buildTypes:
        description: 'Build types'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
          - Release,Debug
      runTests:
        description: 'Run tests'
        required: false
        default: true
        type: boolean
      publishNuGet:
        description: 'Publish to NuGet'
        required: false
        default: false
        type: boolean
      publishGitHub:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
env:
  CPM_CACHE_PATH: ${{ github.workspace }}/.cpmcache

# ============================================================================
# JOBS
# ============================================================================
jobs:
  # ==========================================================================
  # JOB 1: WINDOWS BUILD
  # ==========================================================================
  windows-build:
    name: Build Windows ${{ matrix.arch }} with ${{ matrix.compiler }} (${{ matrix.buildType }})
    runs-on: [self-hosted, windows]
    if: |
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'Windows')
    
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
        compiler: [MSVC]
        buildType: [Release]
        exclude:
          # Exclude combinations not needed
          - arch: arm64
            buildType: Debug
    
    env:
      CMAKE_PRESET: Windows-${{ matrix.arch }}-${{ matrix.buildType }}
      BUILD_TYPE: ${{ matrix.buildType }}
    
    steps:
      # ====================================================================
      # Checkout
      # ====================================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion

      # ====================================================================
      # Setup Visual Studio environment
      # ====================================================================
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      # ====================================================================
      # Install dependencies
      # ====================================================================
      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      # ====================================================================
      # Setup GitVersion
      # ====================================================================
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: version
        uses: gittools/actions/gitversion/execute@v0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Set build number
        run: |
          if ("${{ github.ref }}" -eq "refs/heads/main" -or "${{ github.ref }}" -eq "refs/heads/master") {
            echo "BUILD_VERSION=${{ steps.version.outputs.majorMinorPatch }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "BUILD_VERSION=${{ steps.version.outputs.semVer }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
        shell: pwsh

      # ====================================================================
      # Build
      # ====================================================================
      - name: CMake Configure
        run: |
          cmake --preset ${{ env.CMAKE_PRESET }} `
            -DCI_BUILDID=${{ steps.version.outputs.majorMinorPatch }} `
            -DCPM_SOURCE_CACHE=${{ env.CPM_CACHE_PATH }}
        working-directory: ${{ github.workspace }}

      - name: CMake Build
        run: |
          cmake --build --preset ${{ env.CMAKE_PRESET }} `
            -DCI_BUILDID=${{ steps.version.outputs.majorMinorPatch }} `
            -DCPM_SOURCE_CACHE=${{ env.CPM_CACHE_PATH }}
        working-directory: ${{ github.workspace }}

      # ====================================================================
      # Upload build artifacts
      # ====================================================================
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.CMAKE_PRESET }}
          path: build/${{ env.CMAKE_PRESET }}
          retention-days: 5

      # ====================================================================
      # Run tests
      # ====================================================================
      - name: Run tests
        if: success()
        run: |
          cmake -E chdir build/${{ env.CMAKE_PRESET }}/tests `
            ctest --output-junit build/${{ env.CMAKE_PRESET }}/tests/results/${{ env.CMAKE_PRESET }}_test_detail.xml --output-on-failure
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ====================================================================
      # Publish test results
      # ====================================================================
      - name: Publish test results
        if: success()
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        with:
          files: build/${{ env.CMAKE_PRESET }}/tests/results/${{ env.CMAKE_PRESET }}_test_detail.xml
          check_name: Test Results - ${{ env.CMAKE_PRESET }}
        continue-on-error: true

      # ====================================================================
      # NuGet Packaging
      # ====================================================================
      - name: Install NuGet
        if: success()
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '>=6.0.0'

      - name: NuGet Pack
        if: success()
        run: |
          nuget pack pack/*.nuspec -Version ${{ steps.version.outputs.majorMinorPatch }} -OutputDirectory ${{ github.workspace }}/nuget-packages
        working-directory: ${{ github.workspace }}

      - name: Upload NuGet artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nuget-packages/
          retention-days: 5

  # ==========================================================================
  # JOB 2: LINUX BUILD
  # ==========================================================================
  linux-build:
    name: Build Linux ${{ matrix.arch }} with ${{ matrix.compiler }} (${{ matrix.buildType }})
    runs-on: [self-hosted, linux]
    if: |
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.platforms, 'Linux')
    
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
        compiler: [Clang, GCC]
        buildType: [Release, Debug]
    
    env:
      CMAKE_PRESET: Linux-${{ matrix.compiler }}-${{ matrix.buildType }}
      BUILD_TYPE: ${{ matrix.buildType }}
    
    steps:
      # ====================================================================
      # Checkout
      # ====================================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion

      # ====================================================================
      # Install dependencies
      # ====================================================================
      - name: Install CMake
        run: |
          if ! command -v cmake &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y cmake
          fi

      - name: Install Ninja
        run: |
          if ! command -v ninja &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Install Clang
        if: matrix.compiler == 'Clang'
        run: |
          if ! command -v clang &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y clang lld
          fi

      - name: Install GCC
        if: matrix.compiler == 'GCC'
        run: |
          if ! command -v gcc &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y gcc g++
          fi

      - name: Install gcovr
        if: matrix.buildType == 'Debug'
        run: |
          if ! command -v gcovr &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y gcovr
          fi

      # ====================================================================
      # Setup GitVersion
      # ====================================================================
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: version
        uses: gittools/actions/gitversion/execute@v0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Save version information
        run: |
          echo "${{ steps.version.outputs.majorMinorPatch }}" > TagVersion.txt
          echo "${{ steps.version.outputs.fullSemVer }}" > FullSemVer.txt
          echo "Version: ${{ steps.version.outputs.majorMinorPatch }}"
          echo "Full SemVer: ${{ steps.version.outputs.fullSemVer }}"

      # ====================================================================
      # Build
      # ====================================================================
      - name: CMake Configure
        run: |
          cmake --preset ${{ env.CMAKE_PRESET }} \
            -DCI_BUILDID=${{ steps.version.outputs.majorMinorPatch }} \
            -DCPM_SOURCE_CACHE=${{ env.CPM_CACHE_PATH }}
        working-directory: ${{ github.workspace }}

      - name: CMake Build
        run: |
          cmake --build --preset ${{ env.CMAKE_PRESET }} \
            -DCI_BUILDID=${{ steps.version.outputs.majorMinorPatch }} \
            -DCPM_SOURCE_CACHE=${{ env.CPM_CACHE_PATH }}
        working-directory: ${{ github.workspace }}

      # ====================================================================
      # Upload build artifacts
      # ====================================================================
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.CMAKE_PRESET }}
          path: build/${{ env.CMAKE_PRESET }}
          retention-days: 5

      # ====================================================================
      # Run tests
      # ====================================================================
      - name: Run tests
        if: success()
        run: |
          cd build/${{ env.CMAKE_PRESET }}/tests
          ctest --output-junit ${{ github.workspace }}/build/${{ env.CMAKE_PRESET }}/tests/results/${{ env.CMAKE_PRESET }}_test_detail.xml --output-on-failure
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ====================================================================
      # Code Coverage (Debug builds on x64 Linux only)
      # ====================================================================
      - name: Collect code coverage
        if: success() && matrix.buildType == 'Debug' && matrix.arch == 'x64'
        run: |
          gcovr --delete \
            --root ${{ github.workspace }}/ \
            --print-summary \
            --xml-pretty \
            --xml ${{ github.workspace }}/build/${{ env.CMAKE_PRESET }}/tests/results/coverage.xml \
            ${{ github.workspace }}/build/${{ env.CMAKE_PRESET }} \
            --filter='${{ github.workspace }}/include/*' \
            --filter='${{ github.workspace }}/tests/*' \
            --gcov-executable 'llvm-cov gcov'
        working-directory: ${{ github.workspace }}/build/${{ env.CMAKE_PRESET }}
        continue-on-error: true

      # ====================================================================
      # Publish test results
      # ====================================================================
      - name: Publish test results
        if: success()
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        with:
          files: build/${{ env.CMAKE_PRESET }}/tests/results/${{ env.CMAKE_PRESET }}_test_detail.xml
          check_name: Test Results - ${{ env.CMAKE_PRESET }}
        continue-on-error: true

      - name: Publish code coverage
        if: success() && matrix.buildType == 'Debug' && matrix.arch == 'x64'
        uses: codecov/codecov-action@v3
        with:
          files: ./build/${{ env.CMAKE_PRESET }}/tests/results/coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  # ==========================================================================
  # JOB 3: PUBLISH TO NUGET
  # ==========================================================================
  publish-nuget:
    name: Publish to NuGet
    runs-on: [self-hosted, windows]
    needs: [windows-build, linux-build]
    if: |
      success() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'push' || github.event.inputs.publishNuGet == 'true')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: version
        uses: gittools/actions/gitversion/execute@v0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: nuget-packages

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '>=6.0.0'

      - name: Publish to NuGet
        run: |
          nuget push nuget-packages/*.nupkg -Source https://api.nuget.org/v3/index.json -ApiKey ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true

  # ==========================================================================
  # JOB 4: PUBLISH TO GITHUB
  # ==========================================================================
  publish-github:
    name: Publish to GitHub
    runs-on: [self-hosted, windows]
    needs: [windows-build, linux-build]
    if: |
      success() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'push' || github.event.inputs.publishGitHub == 'true')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: version
        uses: gittools/actions/gitversion/execute@v0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.majorMinorPatch }}
          name: v${{ steps.version.outputs.majorMinorPatch }}
          body: |
            Documentation: https://github.com/${{ github.repository }}
          files: artifacts/**/*
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
