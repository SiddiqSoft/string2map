# ============================================================================
# Azure Pipelines NuGet Release Template
# ============================================================================
#
# Purpose: Publish NuGet package to nuget.org
# Called by: azure-pipelines.yml (Publication stage)
# Triggers: When PublishNuGet parameter is true
#
# This template:
# 1. Downloads NuGet packages from build artifacts
# 2. Publishes packages to nuget.org
# 3. Handles authentication via service connection
#
# Requirements:
# - NuGet service connection configured in Azure DevOps
# - NuGet packages created by Windows build job
# - Package metadata correct (version, ID, etc.)
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
# Parameters passed from the main pipeline (azure-pipelines.yml)
# 
# IMPORTANT: Parameters use compile-time syntax ${{ parameters.name }}
# They are evaluated during pipeline parsing, not during job execution
parameters:
  - name: displayName
    type: string
    # Description: Display name for the job in Azure DevOps UI
    # Example: "Nuget Release"
    
  - name: PublishNuGet
    type: boolean
    default: true
    # Description: Whether to publish NuGet package
    # When true: Publishes package to nuget.org
    # When false: Skips NuGet publishing

# ============================================================================
# JOBS
# ============================================================================
# Job definition for NuGet release
jobs:
  # ========================================================================
  # NuGet Release Job
  # ========================================================================
  # Publishes NuGet packages to nuget.org
  # Downloads packages from build artifacts
  # Handles authentication via service connection
  - job: NugetRelease
    displayName: Nuget Release
    
    # ====================================================================
    # AGENT POOL CONFIGURATION
    # ====================================================================
    # Specifies which build agent to use
    pool:
      name: Default
      # Uses default agent pool
      # Requires: Windows agent (NuGet works best on Windows)
      demands:
        - Agent.OS -equals Windows_NT
        # Requires: Windows operating system
        # Note: Picking other than Windows causes occasional issues with NuGet
    
    # ====================================================================
    # JOB VARIABLES
    # ====================================================================
    # Variables specific to this job
    variables:
      TagVersion: $(Build.BuildNumber)
      # Version tag from build number
      # Set by build jobs (e.g., "1.2.3")
    
    # ====================================================================
    # JOB STEPS
    # ====================================================================
    # Sequential steps executed in order
    steps:
      # ====================================================================
      # Step 1: No Checkout
      # ====================================================================
      # Don't checkout source code (not needed for publishing)
      - checkout: none
        # Skips source code checkout
        # Saves time since we only need artifacts
      
      # ====================================================================
      # Step 2: Debug Output
      # ====================================================================
      # Echo variables for debugging and verification
      # This helps verify that variables were set correctly
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "TagVersion:  $(TagVersion)"
            echo "BuildNumber:  $(Build.BuildNumber)"
            echo "----------------------------------------------------------------"
            set 
        # Output:
        # - TagVersion: Version tag for the package
        # - BuildNumber: Azure DevOps build number
        # - All environment variables
      
      # ====================================================================
      # Step 3: Download NuGet Packages
      # ====================================================================
      # Downloads NuGet packages from build artifacts
      # These packages were created during the Windows build stage
      # 
      # IMPORTANT NOTES:
      # - Artifact name: "nuget-packages"
      # - Must be created by Windows build job
      # - Only runs if previous steps succeeded
      - task: DownloadBuildArtifacts@0
        displayName: "Download NuGet packages"
        inputs:
          downloadType: "single"
          # Download a single artifact
          artifactName: "nuget-packages"
          # Name of the artifact to download
          downloadPath: "$(Build.ArtifactStagingDirectory)"
          # Download to artifact staging directory
        condition: succeeded()
        # Only run if previous steps succeeded
      
      # ====================================================================
      # Step 4: Publish to NuGet
      # ====================================================================
      # Publishes NuGet packages to nuget.org
      # 
      # IMPORTANT NOTES:
      # - Requires NuGet service connection configured in Azure DevOps
      # - Service connection name: "sqs-nuget"
      # - Requires: NuGet API key with publish permissions
      # - Only runs if PublishNuGet is true
      - task: NuGetCommand@2
        displayName: "NuGet push v$(TagVersion)"
        inputs:
          # NuGet command to execute
          command: "push"
          # Packages to push (all .nupkg files in artifact directory)
          packagesToPush: "$(Build.ArtifactStagingDirectory)/**/*.nupkg"
          # NuGet feed configuration
          nuGetFeedType: "external"
          # Use external feed (nuget.org)
          publishFeedCredentials: "sqs-nuget"
          # Service connection for authentication
          # Must be configured in Azure DevOps project settings
        condition: and(succeeded(), eq(variables['PublishNuGet'], true))
        # Only run if:
        # - Previous steps succeeded
        # - PublishNuGet is true
