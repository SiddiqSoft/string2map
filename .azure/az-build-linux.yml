# ============================================================================
# Azure Pipelines Linux Build Template
# ============================================================================
#
# Purpose: Build the project on Linux with Clang or GCC compiler
# Called by: azure-pipelines.yml (StgBldLinux stage)
# Triggers: When RunLinux parameter is true
#
# This template:
# 1. Builds the project on Linux with Clang or GCC compiler
# 2. Supports Release and Debug build types
# 3. Runs tests (optional)
# 4. Collects code coverage (Debug builds only)
# 5. Publishes build artifacts and test results
# 6. Saves version information for cross-stage sharing
#
# Key Features:
# - No NuGet package creation (Linux-only builds)
# - Saves version to files for cross-stage sharing
# - Supports both Clang and GCC compilers
# - ASAN and code coverage for Debug builds
#
# Requirements:
# - Self-hosted Linux build agents
# - CMake 3.29+, Ninja, Docker
# - Clang 21+ or GCC 16+
#
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: displayName
    type: string

  - name: architectures
    type: stringList
    default: [ x64, arm64 ]
    values: [ x64, arm64 ]

  - name: compilers
    type: stringList
    default: [ Clang ]
    values: [ Clang, GCC ]

  - name: buildTypes
    type: stringList
    default: [ Release, Debug ]
    values: [ Release, Debug ]

  - name: runTests
    type: boolean
    default: true


# ============================================================================
# JOBS
# ============================================================================
jobs:
  - ${{ each arch in parameters.architectures }}:
    - ${{ each compiler in parameters.compilers }}:
        - ${{ each buildType in parameters.buildTypes }}:
          - job: Job_Linux_${{ arch }}_${{ compiler }}_${{ buildType }}
            displayName: "Build Linux ${{ arch }} with ${{ compiler }} (${{ buildType }})"
    
            workspace:
              clean: all
            
            pool:
              name: Default
        
              demands:
                - Agent.OS -equals Linux
                #- Agent.OSArchitecture -equals ${{ arch }}
                # add additional demands here
            
            variables:
              cmakePreset: Linux-${{ compiler }}-${{ buildType }}
              buildType: ${{ buildType }}
            
            steps:
              # ====================================================================
              # Checkout & Pre-test setup
              # We launch pre-test early to allow for such things to spool up in
              # parallel during the build stage.
              # ====================================================================
              - checkout: self
                name: step1

              - template: az-pretest-linux.yml
                parameters:
                  architecture: ${{ arch }}
                  runTests: ${{ parameters.runTests }}
            
              # ====================================================================
              # VERSION DETECTION
              # ====================================================================
              - task: gitversion-setup@4
                displayName: Install GitVersion
                inputs:
                  versionSpec: 6.x
                  preferLatestVersion: true

              - task: gitversion-execute@4
                displayName: Determine Version
                name: version_step
                inputs:
                  useConfigFile: true
                  configFilePath: GitVersion.yml
                  updateBuildNumber: true

              - bash: |
                  echo "$(GITVERSION_MAJORMINORPATCH)" > TagVersion.txt
                  echo "$(GITVERSION_FULLSEMVER)" > FullSemVer.txt
                  echo "Version: $(GITVERSION_MAJORMINORPATCH)"
                  echo "Full SemVer: $(GITVERSION_FULLSEMVER)"
                displayName: Save Version Information

              # ====================================================================
              # SET BUILD NUMBER
              # ====================================================================
              - bash: |
                  echo "##vso[build.updateBuildNumber]$(GITVERSION_MAJORMINORPATCH)"
                displayName: Set Build Number (Release)
                condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))

              - bash: |
                  echo "##vso[build.updateBuildNumber]$(GITVERSION_SEMVER)"
                displayName: Set Build Number (Pre-release)
                condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

              # ====================================================================
              # BUILD
              # ====================================================================
              - task: CMake@1
                displayName: CMake Configure
                inputs:
                  cmakeArgs: "--preset $(cmakePreset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(cpmCachePath)"
                  workingDirectory: $(System.DefaultWorkingDirectory)

              - task: CMake@1
                displayName: CMake Build
                inputs:
                  cmakeArgs: "--build --preset $(cmakePreset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(cpmCachePath)"
                  workingDirectory: $(System.DefaultWorkingDirectory)
                condition: succeeded()

              - task: PublishBuildArtifacts@1
                displayName: Publish Build Artifacts
                inputs:
                  PathtoPublish: $(System.DefaultWorkingDirectory)/build/$(cmakePreset)
                  ArtifactName: build-$(cmakePreset)
                  publishLocation: Container
                condition: succeeded()

              # ====================================================================
              # TESTING
              # ====================================================================
              - task: CMake@1
                displayName: Run Tests
                inputs:
                  cmakeArgs: "-E chdir $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests ctest --output-junit $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests/results/$(cmakePreset)_test_detail.xml --output-on-failure"
                  workingDirectory: $(System.DefaultWorkingDirectory)
                continueOnError: true
                condition: and(succeeded(), eq(${{ parameters.runTests }}, true))

              - template: az-posttest-linux.yml
                parameters:
                  runTests: ${{ parameters.runTests }}
                  architecture: ${{ arch }}
              
              # ====================================================================
              # CODE COVERAGE (Debug builds on x64 Linux only)
              # ====================================================================
              - bash: |
                  echo "Collecting code coverage..."
                  gcovr --delete \
                    --root $(System.DefaultWorkingDirectory)/ \
                    --print-summary \
                    --xml-pretty \
                    --xml $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests/results/coverage.xml \
                    $(System.DefaultWorkingDirectory)/build/$(cmakePreset) \
                    --filter='$(System.DefaultWorkingDirectory)/include/*' \
                    --filter='$(System.DefaultWorkingDirectory)/tests/*' \
                    --gcov-executable 'llvm-cov gcov'
                displayName: Collect Code Coverage
                workingDirectory: $(System.DefaultWorkingDirectory)/build/$(cmakePreset)
                condition: and(succeeded(), eq(variables['BuildType'], 'Debug'), startsWith(variables['Agent.OS'], 'Linux'), eq(variables['Agent.OSArchitecture'], 'X64'))
                continueOnError: true

              # ====================================================================
              # PUBLISH RESULTS
              # ====================================================================
              - task: PublishTestResults@2
                displayName: Publish Test Results
                inputs:
                  testResultsFormat: JUnit
                  testRunTitle: Tests $(cmakePreset)
                  testResultsFiles: $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests/results/$(cmakePreset)_test_detail.xml
                  mergeTestResults: false
                  buildConfiguration: $(BuildType)
                continueOnError: true
                condition: and(succeeded(), eq(${{ parameters.runTests }}, true), or(eq(variables['BuildType'], 'Release'), failed()))

              - task: PublishCodeCoverageResults@2
                displayName: Publish Code Coverage Results
                inputs:
                  summaryFileLocation: $(System.DefaultWorkingDirectory)/build/$(cmakePreset)/tests/results/coverage.*
                condition: and(succeeded(), eq(variables['BuildType'], 'Debug'), startsWith(variables['Agent.OS'], 'Linux'), eq(variables['Agent.OSArchitecture'], 'X64'))
                continueOnError: true
